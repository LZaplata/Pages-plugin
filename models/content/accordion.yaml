fields:
    _color_scheme:
        label: Barvy
        type: section
        trigger:
            action: show
            field: ^options_inherited
            condition: unchecked

    color_scheme:
        label: Schéma
        type: colorschemeselector
        span: full
        trigger:
            action: show
            field: ^options_inherited
            condition: unchecked

    _appearance:
        label: Vzhled
        type: section
        trigger:
            action: show
            field: ^options_inherited
            condition: unchecked

    border_width:
        label: Šířka ohraničení
        type: rangeselector
        span: auto
        max: 10
        default: 0
        unit: px
        trigger:
            action: show
            field: ^options_inherited
            condition: unchecked

    border_radius:
        label: Poloměr rohů
        type: dropdown
        span: auto
        options:
            0: Žádný
            sm: Malý
            base: Normální
            lg: Velký
            xl: Extra velký
            circle: Kruh
        default: base
        trigger:
            action: show
            field: ^options_inherited
            condition: unchecked

    gap:
        label: Mezera mezi položkami
        type: rangeselector
        span: auto
        max: 5
        default: 3
        trigger:
            action: show
            field: ^options_inherited
            condition: unchecked

    _heading:
        label: Nadpis
        type: section
        trigger:
            action: show
            field: ^options_inherited
            condition: unchecked

    heading:
        type: nestedform
        form:
            fields:
                color_scheme:
                    label: Schéma
                    type: colorschemeselector
                    span: full

                font_style:
                    label: Písmo
                    type: dropdown
                    span: auto
                    options:
                        paragraph: Odstavec
                        subheading: Podnadpis
                        heading: Nadpis
                        accent: Akcent
                    default: heading

                font_size:
                    label: Velikost
                    type: dropdown
                    span: auto
                    options:
                        1: Nadpis 1
                        2: Nadpis 2
                        3: Nadpis 3
                        4: Nadpis 4
                        5: Nadpis 5
                        6: Nadpis 6
                    default: 5

                padding_top:
                    label: Vnitřní okraj nahoře
                    type: rangeselector
                    span: auto
                    max: 10
                    default: 3

                padding_bottom:
                    label: Vnitřní okraj dole
                    type: rangeselector
                    span: auto
                    max: 10
                    default: 3

                padding_left:
                    label: Vnitřní okraj vlevo
                    type: rangeselector
                    span: auto
                    max: 10
                    default: 3

                padding_right:
                    label: Vnitřní okraj vpravo
                    type: rangeselector
                    span: auto
                    max: 10
                    default: 3
        trigger:
            action: show
            field: ^options_inherited
            condition: unchecked

    _body:
        label: Tělo
        type: section
        trigger:
            action: show
            field: ^options_inherited
            condition: unchecked

    body:
        type: nestedform
        form:
            fields:
                color_scheme:
                    label: Schéma
                    type: colorschemeselector
                    span: full

                padding_top:
                    label: Vnitřní okraj nahoře
                    type: rangeselector
                    span: auto
                    max: 10
                    default: 3

                padding_bottom:
                    label: Vnitřní okraj dole
                    type: rangeselector
                    span: auto
                    max: 10
                    default: 3

                padding_left:
                    label: Vnitřní okraj vlevo
                    type: rangeselector
                    span: auto
                    max: 10
                    default: 3

                padding_right:
                    label: Vnitřní okraj vpravo
                    type: rangeselector
                    span: auto
                    max: 10
                    default: 3
        trigger:
            action: show
            field: ^options_inherited
            condition: unchecked
